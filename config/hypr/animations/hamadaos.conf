# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — The Butter Animation System
# ═══════════════════════════════════════════════════════════════════════════════
# Every curve value has been chosen to match the physical feel of macOS Sonoma,
# iOS 17 spring physics, and Windows 11 Fluent Design.
#
# All speeds are tuned for "1x" on the AnimationPage slider.
# The AnimationService multiplies/divides these at runtime:
#   1x (default): speed as written below
#   2x (faster):  speed = floor(value / 2)
#   0.5x (slower): speed = floor(value * 2)
#
# Reference repos:
#   end-4/dots-hyprland     — emphasizedDecel, menu_decel, stall curves
#   ilyamiro/imperative-dots — myBezier (identical to macosOpen)
#   HamadaOS build plan §14 — exact curve values below
# ═══════════════════════════════════════════════════════════════════════════════

animations {

    enabled = true
    first_launch_animation = true


    # ═══════════════════════════════════════════════════════════════════════════
    # BEZIER CURVE LIBRARY
    # ═══════════════════════════════════════════════════════════════════════════
    #
    # Format: bezier = <name>, <x1>, <y1>, <x2>, <y2>
    # Curve runs from (0,0) to (1,1). Control points shape the feel.
    #
    # y > 1.0 → overshoots target (spring bounce)
    # y < 0.0 → anticipates (pulls back before launching)
    # x1 near 0 → fast initial takeoff
    # x2 near 1 → long gentle settle
    # ═══════════════════════════════════════════════════════════════════════════

    # ── macOS Sonoma window open ────────────────────────────────────────────
    # Elastic deceleration with a tiny overshoot at the end.
    # y2=1.05 → window pops to 105% size then settles to 100%.
    # Feels like a physical object with slight momentum.
    bezier = macosOpen,   0.05, 0.9,  0.1,  1.05

    # ── macOS window close ──────────────────────────────────────────────────
    # Fast ease-out, zero overshoot. Delayed start (y stays near 0 for ~40%
    # of duration), then accelerates to finish quickly. Feels immediate.
    bezier = macosClose,  0.4,  0.0,  1.0,  1.0

    # ── macOS Spaces horizontal slide ───────────────────────────────────────
    # Apple's spatial model curve. Smooth momentum deceleration throughout —
    # no bounce, no sharp stops. The "buttery" workspace switch feel.
    bezier = macosSpace,  0.25, 0.46, 0.45, 0.94

    # ── iOS 17 spring ──────────────────────────────────────────────────────
    # Significant overshoot with a settle phase. y1=1.56 means the animation
    # peaks at 156% of target value at ~34% of the duration, then settles.
    # Best for: window open, notification pop-in, popup appearance.
    bezier = iosSpring,   0.34, 1.56, 0.64, 1.0

    # ── Windows 11 Fluent snap ──────────────────────────────────────────────
    # Snap-in with soft tail. Zero initial horizontal velocity (x1=0),
    # rapid vertical rise, then a gentle deceleration for the final 42%.
    # Best for: window move/resize, snapping animations.
    bezier = fluentSnap,  0.0,  0.9,  0.58, 1.0

    # ── Clean exit ──────────────────────────────────────────────────────────
    # Fast out with minimal drag. The animation stays nearly invisible for
    # ~60% of its duration (y<0.05), then exits rapidly in the final 40%.
    # Best for: panel close, window close, anything the user wants gone NOW.
    bezier = fluidExit,   0.6,  0.05, 0.95, 0.05

    # ── Linear (for reference — not used in production animations) ──────────
    # bezier = linear,    0.0,  0.0,  1.0,  1.0


    # ═══════════════════════════════════════════════════════════════════════════
    # WINDOW ANIMATIONS
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Window Open ──────────────────────────────────────────────────────────
    # iOS spring pop-in from 80% scale. Windows "breathe in" with a satisfying
    # bounce — they overshoot slightly then settle. Speed 3 = 3 animation cycles.
    animation = windowsIn,   1, 3, iosSpring,  popin 80%

    # ── Window Close ─────────────────────────────────────────────────────────
    # Faster than open (speed 2 vs 3). macosClose curve has a delayed start
    # then rapid finish — the window "gets out of your way" quickly.
    animation = windowsOut,  1, 2, macosClose, popin 90%

    # ── Window Move / Resize ─────────────────────────────────────────────────
    # Windows 11 Fluent snap curve. Smooth slide with no overshoot.
    # The 0.0 x1 gives a clean, crisp start to every move.
    animation = windowsMove, 1, 3, fluentSnap, slide


    # ═══════════════════════════════════════════════════════════════════════════
    # WORKSPACE ANIMATIONS
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Horizontal workspace switch ──────────────────────────────────────────
    # macOS Spaces momentum feel. Slide with gentle deceleration —
    # never jarring, always smooth.
    animation = workspaces, 1, 3, macosSpace, slide

    # ── Special workspace (scratchpad) ───────────────────────────────────────
    # Slides in vertically with emphasized deceleration (end-4 pattern).
    # In: smooth descent. Out: fast ascent.
    animation = specialWorkspaceIn,  1, 2.8, macosOpen, slidevert
    animation = specialWorkspaceOut, 1, 1.2, fluidExit, slidevert


    # ═══════════════════════════════════════════════════════════════════════════
    # LAYER ANIMATIONS — Quickshell panels, rofi, notifications
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Layer slide in ───────────────────────────────────────────────────────
    # macOS-style elastic slide. Panels glide in with a tiny settle.
    animation = layers,       1, 3,   macosOpen, slide

    # ── Layer slide out ──────────────────────────────────────────────────────
    # Clean exit — fast, minimal drag.
    animation = layersOut,    1, 2.4, fluidExit,  slide

    # ── Layer pop-in (for centered dialogs/modals) ───────────────────────────
    # Spring bounce at 93% scale — feels like an iOS alert.
    animation = layersIn,     1, 2.7, iosSpring,  popin 93%


    # ═══════════════════════════════════════════════════════════════════════════
    # FADE ANIMATIONS
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Fade in — smooth entrance ────────────────────────────────────────────
    # macosOpen: gentle deceleration, content appears smoothly.
    animation = fadeIn,       1, 3, macosOpen

    # ── Fade out — quick exit ────────────────────────────────────────────────
    # fluidExit: stays visible briefly then fades fast.
    animation = fadeOut,      1, 2, fluidExit

    # ── Layer fades (for panels that prefer fade over slide) ─────────────────
    animation = fadeLayersIn,  1, 3,   macosOpen
    animation = fadeLayersOut, 1, 2.7, fluidExit

    # ── Generic fade (backward compat, dim transitions) ──────────────────────
    animation = fade,         1, 3, macosSpace


    # ═══════════════════════════════════════════════════════════════════════════
    # BORDER & MISC ANIMATIONS
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Active border color transition ───────────────────────────────────────
    animation = border,       1, 10, macosSpace

    # ── Border angle (gradient rotation — if using angled gradients) ─────────
    animation = borderangle,  1, 8,  fluentSnap, once

    # ── Dim (inactive window dimming) ────────────────────────────────────────
    animation = fadeDim,      1, 3, macosSpace

    # ── Shadow transitions ───────────────────────────────────────────────────
    animation = fadeShadow,   1, 3, macosSpace
}


# ═══════════════════════════════════════════════════════════════════════════════
# ANIMATION CURVE VISUAL REFERENCE
# ═══════════════════════════════════════════════════════════════════════════════
#
# macosOpen                     iosSpring
# (elastic, tiny overshoot)     (big bounce, settle)
#     1.05┌────              1.56┐  ╭
#     1.00┤    ╲                1.00┤  │  ╲
#         │     ╲                  │  │   ╲___
#         │      ╲___              │ ╱
#         └──────────              └─────────
#
# macosClose                    fluentSnap
# (delayed, fast finish)        (crisp start, soft tail)
#     1.00┐    ╱              1.00┐    ___
#         │   ╱                   │  ╱
#         │  ╱                    │ ╱
#         │_╱                     │╱
#         └──────────              └─────────
#
# macosSpace                    fluidExit
# (smooth decel, no bounce)     (delayed, rapid exit)
#     1.00┐   ___             1.00┐        ╱
#         │ ╱                    │       ╱
#         │╱                     │______╱
#         └──────────              └─────────
# ═══════════════════════════════════════════════════════════════════════════════
