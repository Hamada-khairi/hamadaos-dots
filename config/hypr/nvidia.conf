# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — NVIDIA GPU Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Source this from hyprland.conf or userprefs.conf if running an NVIDIA GPU.
# These env vars are REQUIRED for proper Wayland rendering on NVIDIA hardware.
# ═══════════════════════════════════════════════════════════════════════════════

# ── NVIDIA driver backend ─────────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

# ── G-Sync / VRR enable ───────────────────────────────────────────────────────
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,1

# ── Fix cursor issues on NVIDIA ────────────────────────────────────────────────
env = WLR_NO_HARDWARE_CURSORS,1
env = WLR_RENDERER_ALLOW_SOFTWARE,1

# ── Fix Electron/Chromium flickering ───────────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── Explicit sync (Hyprland 0.41+) ─────────────────────────────────────────────
render {
    explicit_sync = 1
    explicit_sync_kernel = 1
}

# ── NVIDIA persistence mode (run once after driver load) ───────────────────────
# exec-once = sudo nvidia-smi -pm 1
