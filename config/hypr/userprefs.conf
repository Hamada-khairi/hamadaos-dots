# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — User Preferences
# ═══════════════════════════════════════════════════════════════════════════════
# HyDE-safe override file (survives HyDE updates). Window/layer rules live in
# windowrules.conf; keybinds in keybindings.conf; NVIDIA env in nvidia.conf
# (HyDE sources that only on NVIDIA systems — keeps AMD machines booting).
# ═══════════════════════════════════════════════════════════════════════════════

# ── Generated colors (matugen writes this; harmless if missing) ────────────────
source = ~/.config/hypr/themes/colors.conf

# ── GPU routing (hamadaos-hw-profile.sh writes this) ───────────────────────────
# On MUX-less hybrid laptops: forces compositing onto the iGPU so the dGPU
# is exclusively the game renderer and can power-gate when idle.
source = ~/.config/hypr/gpu.conf

# ═══════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════════

# Qt theme consistency (qt6ct + Kvantum)
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# GTK theme + scaling consistency
env = GTK_THEME,adw-gtk3-dark
env = GDK_DPI_SCALE,1.0

# Electron/Chromium native Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# fcitx5 — Arabic IME
env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
# (GTK_IM_MODULE intentionally unset — GTK4 apps use Wayland text-input with fcitx5)

# Flatpak app discovery
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

# Cursor
env = XCURSOR_SIZE,24


# ═══════════════════════════════════════════════════════════════════════════════
# DECORATION — the "butter" look
# ═══════════════════════════════════════════════════════════════════════════════

decoration {
    rounding = 12
    rounding_power = 3.0      # squircle corners (macOS-like continuity)

    blur {
        enabled           = true
        size              = 10
        passes            = 3
        new_optimizations = true
        xray              = false
        noise             = 0.01
        contrast          = 1.0
        brightness        = 0.9
        vibrancy          = 0.15
        popups            = true
        popups_ignorealpha = 0.6
    }

    shadow {
        enabled        = true
        range          = 20
        render_power   = 4
        offset         = 0 4
        color          = rgba(1a1a2e99)
        color_inactive = rgba(1a1a2e44)
    }

    # Subtle depth cue — inactive windows dim slightly (macOS-style)
    dim_inactive = true
    dim_strength = 0.08
    dim_special  = 0.2
}

general {
    border_size = 1
    col.active_border   = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244aa)

    gaps_in  = 4
    gaps_out = 8

    resize_on_border        = true
    extend_border_grab_area = 30
    allow_tearing           = true   # required for the `immediate` game rule

    snap {
        enabled        = true
        window_gap     = 10
        monitor_gap    = 10
        border_overlap = false
    }
}

misc {
    vrr = 1                          # adaptive sync everywhere (2 in gaming mode)
    render_unfocused_fps = 30        # background windows throttled — saves GPU
    disable_hyprland_logo = true
    disable_splash_rendering = true

    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    focus_on_activate       = true

    allow_session_lock_restore = true
    enable_swallow = false
}

xwayland {
    force_zero_scaling = true        # no blurry legacy apps at fractional scale
}


# ═══════════════════════════════════════════════════════════════════════════════
# INPUT
# ═══════════════════════════════════════════════════════════════════════════════

input {
    kb_layout  = us,ar
    kb_options = grp:win_space_toggle    # Win+Space: English ↔ Arabic

    numlock_by_default = true
    repeat_delay = 250
    repeat_rate  = 35
    follow_mouse = 1

    # Competitive-gaming mouse: raw 1:1 input, no acceleration curve.
    # (Wayland reads evdev directly — there is no X11 translation layer to
    # bypass; flat profile is the whole fix.)
    accel_profile = flat
    sensitivity = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor        = 0.7
    }
}

cursor {
    no_warps = true
}

gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_create_new = true
}


# ═══════════════════════════════════════════════════════════════════════════════
# PLUGINS + AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════════

source = ~/.config/hypr/plugins.conf
# Wallbash-generated hyprbars colors (overrides the defaults in plugins.conf)
source = ~/.config/hypr/hyprbars-colors.conf

# hyprswitch daemon (visual Alt+Tab needs init before first use)
exec-once = hyprswitch init --show-title &

# GNOME Keyring — credential manager (SSH, GPG, app secrets)
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/keyring/ssh

# KDE Connect — phone integration
exec-once = kdeconnect-indicator

# fcitx5 — Arabic IME
exec-once = fcitx5 --replace -d

# Startup sound
exec-once = ~/.config/hypr/scripts/startup-sound.sh

# gromit-mpx daemon — ZoomIt-style drawing (Ctrl+Alt+2 to toggle)
exec-once = gromit-mpx

# NOTE: bar (Quickshell), notifications, wallpaper daemon, polkit agent,
# clipboard, hypridle, and hyprsunset are all started by HyDE via
# ~/.config/hyde/config.toml [hyprland-start] — do not duplicate them here.
