# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — SAFE MODE session
# ═══════════════════════════════════════════════════════════════════════════════
# Selected as "HamadaOS (Safe Mode)" at the login screen. Deliberately sources
# NOTHING — not HyDE, not the dots, not plugins, not the shell. If Quickshell,
# a plugin, a theme, or a config update broke your session, this always boots.
#
# What you get: bare compositor, default theme, a terminal running the rescue
# menu. Fix things, then log back into the normal session.
# ═══════════════════════════════════════════════════════════════════════════════

monitor = , preferred, auto, 1

# No animations, no blur, no plugins — nothing that can fail.
animations { enabled = false }
decoration {
    blur { enabled = false }
    shadow { enabled = false }
    rounding = 0
}
misc {
    disable_hyprland_logo = true
}

# Essential keybinds only
$mainMod = SUPER
bind = $mainMod, RETURN, exec, kitty || foot || alacritty
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, SPACE, togglefloating
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bindm = $mainMod, mouse:272, movewindow

# Auth agent so pkexec/polkit fixes can prompt
exec-once = /usr/lib/polkit-kde-authentication-agent-1 || /usr/lib/hyprpolkitagent

# The rescue menu IS the session
exec-once = kitty --title "HamadaOS Rescue" -e ~/.config/hypr/scripts/hamadaos-rescue.sh
