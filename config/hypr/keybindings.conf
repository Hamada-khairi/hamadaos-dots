# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Keybindings
# ═══════════════════════════════════════════════════════════════════════════════
# $mainMod (SUPER) is defined by HyDE's variables.conf, which loads first.
#
# Quickshell panels use the `global` dispatcher → GlobalShortcut objects in
# shell.qml. Zero process spawn, zero latency. The `qs ipc call` form is the
# script-friendly fallback (used for OSD-coupled volume/brightness keys).
# ═══════════════════════════════════════════════════════════════════════════════

$hamadaScripts = ~/.config/hypr/scripts

# ═══ 1. SHELL PANELS ════════════════════════════════════════════════════════════

bindd = $mainMod, I, Settings app, global, quickshell:settingsToggle
bindd = $mainMod, C, Control center, global, quickshell:controlCenterToggle
bindd = $mainMod, SPACE, App launcher, global, quickshell:launcherToggle
bindd = $mainMod, TAB, Task overview, global, quickshell:overviewToggle
bindd = CTRL ALT, Delete, Power menu, global, quickshell:powerMenuToggle

# hyprexpo compositor-level workspace grid (live thumbnails)
bindd = $mainMod, grave, Workspace grid, hyprexpo:expo, toggle

# Clipboard history (HyDE's cliphist + rofi)
bindd = $mainMod, V, Clipboard history, exec, pkill -x rofi || hyde-shell cliphist -c

# ═══ 2. APPS ════════════════════════════════════════════════════════════════════

bindd = $mainMod, RETURN, Terminal, exec, kitty
bindd = $mainMod, E, File manager, exec, dolphin
bindd = $mainMod, B, Browser, exec, firefox
bindd = CTRL SHIFT, Escape, Task manager, exec, mission-center
bindd = $mainMod, F, File search, exec, fsearch

# ═══ 3. WINDOW MANAGEMENT ═══════════════════════════════════════════════════════

bindd = $mainMod, Q, Close window, killactive
bindd = ALT, F4, Close window, killactive
bindd = $mainMod, D, Maximize, fullscreen, 1
bindd = $mainMod SHIFT, SPACE, Toggle floating, togglefloating
bindd = $mainMod, P, Pin (always on top), pin

# ── Win+Arrow snapping (Windows muscle memory) ──────────────────────────────────
bindd = $mainMod, left, Snap left half, exec, $hamadaScripts/snap-quarter.sh left
bindd = $mainMod, right, Snap right half, exec, $hamadaScripts/snap-quarter.sh right
bindd = $mainMod, up, Maximize, fullscreen, 1
bindd = $mainMod, down, Minimize to tray workspace, movetoworkspacesilent, special:minimized
bindd = $mainMod SHIFT, down, Restore minimized, togglespecialworkspace, minimized

# Quarter snapping (FancyZones-style): Super+Alt+arrows
bindd = $mainMod ALT, left, Snap top-left quarter, exec, $hamadaScripts/snap-quarter.sh topleft
bindd = $mainMod ALT, up, Snap top-right quarter, exec, $hamadaScripts/snap-quarter.sh topright
bindd = $mainMod ALT, down, Snap bottom-left quarter, exec, $hamadaScripts/snap-quarter.sh bottomleft
bindd = $mainMod ALT, right, Snap bottom-right quarter, exec, $hamadaScripts/snap-quarter.sh bottomright

# ── Focus / move ─────────────────────────────────────────────────────────────────
bindd = $mainMod SHIFT, left, Focus left, movefocus, l
bindd = $mainMod SHIFT, right, Focus right, movefocus, r
bindd = $mainMod SHIFT, up, Focus up, movefocus, u
bindd = $mainMod CTRL, left, Move window left, movewindow, l
bindd = $mainMod CTRL, right, Move window right, movewindow, r
bindd = $mainMod CTRL, up, Move window up, movewindow, u
bindd = $mainMod CTRL, down, Move window down, movewindow, d

# ── Mouse ────────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══ 4. ALT+TAB — hyprswitch (daemon started in userprefs.conf) ══════════════════

bind = ALT, Tab, exec, hyprswitch gui --mod-key alt_l --key tab --close mod-key-release --reverse-key=mod=shift_l --max-switch-offset 9
bind = ALT SHIFT, Tab, exec, hyprswitch gui --mod-key alt_l --key tab --close mod-key-release --reverse-key=mod=shift_l --max-switch-offset 9 --reverse

# ═══ 5. WORKSPACES ═══════════════════════════════════════════════════════════════

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = CTRL $mainMod, right, workspace, r+1
bind = CTRL $mainMod, left, workspace, r-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindd = $mainMod, S, Scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, S, Move to scratchpad, movetoworkspace, special:magic

# ═══ 6. UTILITIES ════════════════════════════════════════════════════════════════

# Screenshots (HyDE's grim+slurp+satty pipeline)
bindd = $mainMod, Print, Snip region (frozen), exec, hyde-shell screenshot sf
bindd = , Print, Screenshot all monitors, exec, hyde-shell screenshot p
bindd = $mainMod SHIFT, T, OCR — copy text from screen, exec, $hamadaScripts/screen-ocr.sh
bindd = $mainMod SHIFT, C, Color picker, exec, hyprpicker -a
bindd = $mainMod SHIFT, G, Gaming mode, exec, $hamadaScripts/gaming-mode.sh
bindd = $mainMod SHIFT, B, Night light, exec, $hamadaScripts/nightlight-toggle.sh
bindd = $mainMod, W, WiFi menu, exec, $hamadaScripts/wifi-menu.sh

# Screen recorder
bindd = $mainMod ALT, R, Screen recorder, exec, kooha

# ═══ 7. SCREEN — ZoomIt, Draw, Lock ═══════════════════════════════════════════════
# ZoomIt muscle memory (Sysinternals): Ctrl+Alt+1 = zoom, Ctrl+Alt+2 = draw.

bindd  = CTRL ALT, 1, ZoomIt — toggle 2x zoom, exec, $hamadaScripts/hamadaos-zoom.sh toggle
binde  = CTRL ALT, equal, Zoom in (hold to repeat), exec, $hamadaScripts/hamadaos-zoom.sh in
binde  = CTRL ALT, minus, Zoom out, exec, $hamadaScripts/hamadaos-zoom.sh out
bindd  = CTRL ALT, 0, Zoom reset, exec, $hamadaScripts/hamadaos-zoom.sh reset
bindd  = $mainMod, Z, Magnifier 2x (legacy), exec, $hamadaScripts/hamadaos-zoom.sh toggle

# Draw on screen (gromit-mpx): toggle drawing · undo · clear
bindd = CTRL ALT, 2, ZoomIt — draw on screen, exec, gromit-mpx --toggle
bindd = CTRL ALT, z, Drawing — undo, exec, gromit-mpx --undo
bindd = CTRL ALT, 3, Drawing — clear all, exec, gromit-mpx --clear

bindd = $mainMod, L, Lock screen, exec, loginctl lock-session
bindd = $mainMod SHIFT, L, Suspend, exec, systemctl suspend

# ═══ 8. MEDIA KEYS — routed through Quickshell so the OSD always matches ═════════

bindle = , XF86AudioRaiseVolume, exec, qs ipc call osd volumeUp
bindle = , XF86AudioLowerVolume, exec, qs ipc call osd volumeDown
bindl  = , XF86AudioMute, exec, qs ipc call osd volumeMute
bindl  = , XF86AudioMicMute, exec, qs ipc call osd micMute
bindle = , XF86MonBrightnessUp, exec, qs ipc call osd brightnessUp
bindle = , XF86MonBrightnessDown, exec, qs ipc call osd brightnessDown

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# ═══ 9. KEYBOARD LAYOUT ═══════════════════════════════════════════════════════════
# Win+Space is handled by kb_options (grp:win_space_toggle). Super+K as backup:
bindd = $mainMod, K, Switch keyboard layout, exec, hyprctl switchxkblayout all next

# ═══ 10. RELOAD ════════════════════════════════════════════════════════════════════
bindd = $mainMod SHIFT, R, Reload Hyprland, exec, hyprctl reload
