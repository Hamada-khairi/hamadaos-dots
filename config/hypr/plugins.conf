# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Hyprland Plugins (hyprbars + hyprexpo)
# ═══════════════════════════════════════════════════════════════════════════════
# Sourced from userprefs.conf. Wallbash recolors the bar via the dcol template
# at ~/.config/hyde/wallbash/always/hamadaos-hyprbars.dcol (installed by
# install.sh) — the values below are the Catppuccin Mocha first-boot defaults.
#
# Game windows, pinned windows, and fullscreen windows get NO title bar —
# see the plugin:hyprbars:nobar rules in windowrules.conf.
# ═══════════════════════════════════════════════════════════════════════════════

plugin = /usr/lib/hyprland/libhyprbars.so
plugin = /usr/lib/hyprland/libhyprexpo.so

plugin {
    hyprbars {
        bar_height = 28
        bar_color = rgba(1e1e2ecc)
        bar_text_color = rgba(cdd6f4ff)
        bar_text_font = Geist
        bar_text_size = 11
        bar_button_padding = 8
        bar_padding = 12
        bar_precedence_over_border = true
        # Windows order: buttons on the RIGHT, close outermost
        bar_buttons_alignment = right

        # Traffic lights: close · minimize (→ special:minimized) · maximize
        hyprbars-button = rgba(f38ba8ff), 14, , hyprctl dispatch killactive
        hyprbars-button = rgba(fab387ff), 14, , hyprctl dispatch movetoworkspacesilent special:minimized
        hyprbars-button = rgba(a6e3a1ff), 14, , hyprctl dispatch fullscreen 1
    }

    hyprexpo {
        columns = 4
        gap_size = 8
        bg_col = rgb(111111)
        workspace_method = center current

        enable_gesture = true
        gesture_fingers = 4
        gesture_distance = 300
        gesture_positive = true
    }
}
