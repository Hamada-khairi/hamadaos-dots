# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Window & Layer Rules
# ═══════════════════════════════════════════════════════════════════════════════
# Sourced by HyDE's user hyprland.conf. Uses the Hyprland 0.53+ rule syntax
# (the one HyDE v26 ships), with a legacy fallback for older compositors —
# the same hyprlang version-guard trick HyDE itself uses.
# ═══════════════════════════════════════════════════════════════════════════════

# hyprlang if HYPRLAND_V_0_53

# ═══ FLOAT EVERYTHING (Windows behavior) ═══════════════════════════════════════
# Every window opens floating, centered, at 70% of the monitor. This is the
# single highest-impact change for people coming from Windows.

windowrule {
    name = hamadaos_float_all
    match:class = .*
    float = true
    center = on
    size = 70% 70%
}

# ── Tile exceptions — apps that genuinely work better tiled ────────────────────
windowrule {
    name = hamadaos_tile_apps
    match:class = ^([Ff]irefox|firefox-esr|chromium|[Bb]rave-browser|code|code-oss|Code|VSCodium|vesktop|discord|Spotify|obsidian)$
    float = false
}

# ── Utility windows — float + center at natural size ───────────────────────────
windowrule {
    name = hamadaos_utility_float
    match:class = ^(org\.pulseaudio\.pavucontrol|pavucontrol|com\.saivert\.pwvucontrol|nm-connection-editor|blueman-manager|nwg-look|nwg-displays|qt[56]ct|kvantummanager|org\.kde\.polkit-kde-authentication-agent-1|hyprpolkitagent|mission-center|io\.missioncenter\.MissionCenter)$
    float = true
    center = on
}

# ── HamadaOS Settings (Quickshell FloatingWindow) ───────────────────────────────
windowrule {
    name = hamadaos_settings_window
    match:title = ^(HamadaOS Settings)$
    float = true
    center = on
    size = 760 600
}

# ── Picture-in-Picture — pinned top-right, keeps aspect ratio ───────────────────
windowrule {
    name = hamadaos_pip
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    float = true
    pin = true
    keep_aspect_ratio = true
    size = (monitor_w*0.25) (monitor_h*0.25)
    move = (monitor_w*0.73) (monitor_h*0.06)
}

# ── Screen-share indicator bubble ───────────────────────────────────────────────
windowrule {
    name = hamadaos_screenshare_indicator
    match:title = ^(.*is sharing (a window|your screen).*)$
    float = true
    pin = true
}

# ═══ GAMING ═════════════════════════════════════════════════════════════════════
# Tearing for lower input latency + no title bars on game windows.

windowrule {
    name = hamadaos_games
    match:class = ^(steam_app_.*|gamescope|cs2|dota2)$
    immediate = true
    plugin:hyprbars:nobar = true
}
windowrule {
    name = hamadaos_games_exe
    match:title = ^(.*\.exe)$
    immediate = true
    plugin:hyprbars:nobar = true
}
windowrule = fullscreen true, match:class ^(gamescope)$

# ── No title bars where they make no sense ──────────────────────────────────────
windowrule {
    name = hamadaos_nobar
    match:class = ^(Rofi|rofi|wlogout|org\.kde\.polkit-kde-authentication-agent-1|hyprpolkitagent)$
    plugin:hyprbars:nobar = true
}
windowrule = plugin:hyprbars:nobar true, match:pinned true
windowrule = plugin:hyprbars:nobar true, match:fullscreen true

# ═══ LAYER RULES — Quickshell surfaces ═══════════════════════════════════════════

layerrule {
    name = hamadaos_qs_blur
    match:namespace = ^(quickshell:(bar|controlCenter|dock|launcher|notificationPopup|osd))$
    blur = true
    ignore_alpha = 0.45
}

layerrule = animation slide top,    match:namespace ^(quickshell:bar)$
layerrule = animation slide right,  match:namespace ^(quickshell:controlCenter)$
layerrule = animation slide bottom, match:namespace ^(quickshell:dock)$
layerrule = animation popin 95%,    match:namespace ^(quickshell:launcher)$
layerrule = animation slide right,  match:namespace ^(quickshell:notificationPopup)$
layerrule = animation slide bottom, match:namespace ^(quickshell:osd)$
layerrule = animation fade,         match:namespace ^(quickshell:session)$
layerrule = no_anim true,           match:namespace ^(quickshell:overview)$

# hyprlang endif

# ───────────────────────────────────────────────────────────────────────────────
# Legacy fallback (Hyprland < 0.53 — old windowrulev2 grammar)
# ───────────────────────────────────────────────────────────────────────────────
# hyprlang if !HYPRLAND_V_0_53

windowrulev2 = float, class:(.*)
windowrulev2 = center, class:(.*)
windowrulev2 = size 70% 70%, class:(.*)
windowrulev2 = tile, class:^([Ff]irefox|chromium|[Bb]rave-browser|code|code-oss|Code|VSCodium|vesktop|discord|Spotify|obsidian)$
windowrulev2 = float, class:^(org\.pulseaudio\.pavucontrol|pavucontrol|nm-connection-editor|blueman-manager|nwg-look|nwg-displays|qt[56]ct|kvantummanager|mission-center)$
windowrulev2 = center, class:^(org\.pulseaudio\.pavucontrol|pavucontrol|nm-connection-editor|blueman-manager|nwg-look|nwg-displays|qt[56]ct|kvantummanager|mission-center)$
windowrulev2 = float, title:^(HamadaOS Settings)$
windowrulev2 = center, title:^(HamadaOS Settings)$
windowrulev2 = float, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = pin, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = keepaspectratio, title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrulev2 = immediate, class:^(steam_app_.*|gamescope|cs2|dota2)$
windowrulev2 = immediate, title:^(.*\.exe)$
windowrulev2 = fullscreen, class:^(gamescope)$
windowrulev2 = plugin:hyprbars:nobar, class:^(steam_app_.*|gamescope|Rofi|rofi|wlogout)$
windowrulev2 = plugin:hyprbars:nobar, fullscreen:1
windowrulev2 = plugin:hyprbars:nobar, pinned:1

layerrule = blur, namespace:^(quickshell:.*)$
layerrule = ignorealpha 0.45, namespace:^(quickshell:.*)$
layerrule = animation slide top, namespace:^(quickshell:bar)$
layerrule = animation slide right, namespace:^(quickshell:controlCenter)$
layerrule = animation slide bottom, namespace:^(quickshell:dock)$
layerrule = animation slide bottom, namespace:^(quickshell:osd)$
layerrule = noanim, namespace:^(quickshell:overview)$

# hyprlang endif
