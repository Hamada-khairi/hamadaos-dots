# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — xdg-desktop-portal-hyprland (screen capture) configuration
# ═══════════════════════════════════════════════════════════════════════════════
# This is the path every screenshare takes (Discord/Vesktop, OBS, browsers).
# Goals: zero-copy DMA-BUF capture, capped capture rate, no re-picking the
# screen every time the same app shares.
# ═══════════════════════════════════════════════════════════════════════════════

screencopy {
    # Cap portal capture at 60fps — Discord streams 30/60 anyway, and an
    # uncapped capture loop steals exactly the frames you can't spare.
    max_fps = 60

    # Remember "share this monitor" per app — no picker spam mid-match.
    allow_token_by_default = true
}
