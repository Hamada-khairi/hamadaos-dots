# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Bluetooth audio quality (WirePlumber)
# ═══════════════════════════════════════════════════════════════════════════════
# THE HEADSET MIC FIX. What's actually happening when "the audio turns to
# shit" the moment an app opens your headset mic:
#
#   Bluetooth can't do high-quality stereo (A2DP) and a microphone at the
#   same time. The instant Discord grabs the mic, the headset drops from
#   A2DP to the HFP "headset" profile — and classic HFP is 8kHz telephone
#   audio from 1998. That's not a bug in your headset; it's the protocol.
#
# What this config does about it:
#
#   · mSBC        — 16kHz wideband HFP. Still not A2DP, but speech-clear
#                   instead of walkie-talkie. Most headsets ≥2018 support it.
#   · SBC-XQ      — higher-bitrate SBC for the A2DP side (music while gaming
#                   sounds noticeably better on headsets without AAC/aptX).
#   · LE Audio roles (bap_*) — headsets with LE Audio/LC3 get the modern
#                   path: good quality WITH mic simultaneously. This is the
#                   actual long-term fix and it's enabled here.
#   · hw-volume   — volume buttons on the headset map to real volume.
#
# Pro move (documented in Settings → Sound): keep the headset on A2DP and
# select "Internal Microphone" as the input device — full-quality game audio
# AND a working mic, no profile switch at all.
# ═══════════════════════════════════════════════════════════════════════════════

monitor.bluez.properties = {
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.enable-hw-volume = true
  bluez5.roles = [ a2dp_sink a2dp_source bap_sink bap_source hfp_hf hsp_hs ]
}
