# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — PipeWire scheduling for weak CPUs
# ═══════════════════════════════════════════════════════════════════════════════
# Counterintuitive but correct: the popular "min-quantum = 256 for low
# latency" advice is BACKWARDS for gaming laptops. Smaller quanta = more
# audio wakeups per second = more CPU stolen from the game = crackling
# under load (the kind you hear in Discord during team fights).
#
# We set a 512-sample floor (~10.7ms at 48kHz — inaudible for gaming) so no
# app can drag the whole graph into 3ms-wakeup territory, and a 2048 ceiling
# so idle desktop audio coasts cheaply.
# ═══════════════════════════════════════════════════════════════════════════════

context.properties = {
  default.clock.min-quantum = 512
  default.clock.max-quantum = 2048
}
