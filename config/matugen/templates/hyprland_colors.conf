# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Hyprland Colors (matugen template)
# ═══════════════════════════════════════════════════════════════════════════════
# Output goes to: ~/.config/hypr/themes/colors.conf
# Sourced by: userprefs.conf or hyprland.conf
#
# Reference:
#   end-4/dots-hyprland — hyprland/colors.lua template
# ═══════════════════════════════════════════════════════════════════════════════

# ── Active border with gradient (primary → secondary) ───────────────────────
col.active_border = rgba({{colors.primary.default.hex}}ff) rgba({{colors.secondary.default.hex}}ff) 45deg

# ── Inactive border (subtle outline) ───────────────────────────────────────
col.inactive_border = rgba({{colors.outline.default.hex}}aa)

# ── Shadow color (darkest surface) ─────────────────────────────────────────
col.shadow = rgba({{colors.shadow.default.hex}}99)
col.shadow_inactive = rgba({{colors.shadow.default.hex}}44)
