# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Kitty Terminal Colors (matugen template)
# ═══════════════════════════════════════════════════════════════════════════════
# Output goes to: ~/.config/kitty/current-theme.conf
# Included by: ~/.config/kitty/kitty.conf via "include current-theme.conf"
# ═══════════════════════════════════════════════════════════════════════════════

# ── Core ─────────────────────────────────────────────────────────────────────
foreground            {{colors.on_surface.default.hex}}
background            {{colors.surface.default.hex}}
selection_foreground  {{colors.on_primary.default.hex}}
selection_background  {{colors.primary.default.hex}}
cursor                {{colors.primary.default.hex}}
cursor_text_color     {{colors.on_primary.default.hex}}

# ── URL underline color ──────────────────────────────────────────────────────
url_color             {{colors.secondary.default.hex}}

# ── Active tab ───────────────────────────────────────────────────────────────
active_tab_foreground {{colors.on_surface.default.hex}}
active_tab_background {{colors.surface_container.default.hex}}
inactive_tab_foreground {{colors.on_surface_variant.default.hex}}
inactive_tab_background {{colors.surface_dim.default.hex}}

# ── Bell / visual bell ───────────────────────────────────────────────────────
visual_bell_color     {{colors.error_container.default.hex}}

# ── 16 ANSI Colors ───────────────────────────────────────────────────────────
# Black
color0  {{colors.surface_dim.default.hex}}
color8  {{colors.outline.default.hex}}

# Red
color1  {{colors.error.default.hex}}
color9  {{colors.error_container.default.hex}}

# Green
color2  {{colors.tertiary.default.hex}}
color10 {{colors.tertiary_container.default.hex}}

# Yellow
color3  {{colors.tertiary_fixed_dim.default.hex}}
color11 {{colors.on_tertiary_fixed_variant.default.hex}}

# Blue
color4  {{colors.secondary.default.hex}}
color12 {{colors.secondary_container.default.hex}}

# Magenta
color5  {{colors.primary.default.hex}}
color13 {{colors.primary_container.default.hex}}

# Cyan
color6  {{colors.secondary_fixed_dim.default.hex}}
color14 {{colors.on_secondary_fixed_variant.default.hex}}

# White
color7  {{colors.on_surface.default.hex}}
color15 {{colors.surface_bright.default.hex}}
