; ═══════════════════════════════════════════════════════════════════════════════
; HamadaOS — GameMode configuration
; ═══════════════════════════════════════════════════════════════════════════════
; Installed to ~/.config/gamemode.ini. This is what makes the whole OS
; "smart and dynamic": ANY game launched with gamemoderun (or through
; hamadaos-game-run, Lutris, Heroic — they all use GameMode) automatically
; flips the ENTIRE system into HamadaOS gaming mode, and flips it back when
; the game exits. No keypress needed.
; ═══════════════════════════════════════════════════════════════════════════════

[general]
; Soft real-time scheduling + niceness for the game process
renice = 10
softrealtime = auto
inhibit_screensaver = 1

[cpu]
park_cores = no
pin_cores = no

[custom]
; Game starts → full HamadaOS gaming mode (workflow, governor, THP, MGLRU…)
start = bash -c '[ -f "${XDG_RUNTIME_DIR:-/tmp}/hamadaos-gaming-mode" ] || ~/.config/hypr/scripts/gaming-mode.sh'
; Game ends → back to balanced
end = bash -c '[ -f "${XDG_RUNTIME_DIR:-/tmp}/hamadaos-gaming-mode" ] && ~/.config/hypr/scripts/gaming-mode.sh'
