<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="font">
    <edit mode="assign" name="antialias"> <bool>true</bool> </edit>
    <edit mode="assign" name="hinting">   <bool>true</bool> </edit>
    <edit mode="assign" name="hint_style"><const>hintslight</const></edit>
    <edit mode="assign" name="rgba">      <const>rgb</const></edit>
    <edit mode="assign" name="lcdfilter"> <const>lcddefault</const></edit>
  </match>
  <alias><family>sans-serif</family><prefer><family>Geist</family></prefer></alias>
  <alias><family>monospace</family><prefer><family>JetBrainsMono Nerd Font</family></prefer></alias>
</fontconfig>
