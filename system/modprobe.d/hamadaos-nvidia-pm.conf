# HamadaOS — NVIDIA runtime power management (MUX-less hybrid laptops)
# Installed to /etc/modprobe.d/ by install.sh ONLY when an NVIDIA hybrid
# laptop is detected (hardware.env: IS_HYBRID=1, NVIDIA_PROPRIETARY=1).
#
# 0x02 = fine-grained runtime D3: the dGPU fully powers down when nothing
# uses it. Desktop work runs on the iGPU (AQ_DRM_DEVICES ordering), so the
# dGPU's watts and heat exist only while a game is actually running —
# which is exactly the thermal headroom a 40W chassis needs.
options nvidia "NVreg_DynamicPowerManagement=0x02"
