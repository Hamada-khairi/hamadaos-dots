# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — Gaming Kernel Parameters
# ═══════════════════════════════════════════════════════════════════════════════
# Installed to /etc/sysctl.d/99-gaming.conf, applied by `sysctl --system`.
# Tuned for LOW-RAM gaming laptops (8–16GB) with zram — the target where
# Windows falls apart (your 45→8fps drops are memory-pressure thrash).
# ═══════════════════════════════════════════════════════════════════════════════

# With zram, swapping early into compressed RAM is CHEAPER than evicting file
# cache (which forces disk re-reads mid-game). 10 was right for disk swap;
# 150 is right for zram (CachyOS ships the same).
vm.swappiness = 150

# zram is random-access — readahead clustering only wastes work.
vm.page-cluster = 0

# Keep directory/inode caches hot (asset streaming does tons of path lookups).
vm.vfs_cache_pressure = 50

# Don't stall game threads doing writeback; let the kernel spread it out.
vm.dirty_ratio = 10
vm.dirty_background_ratio = 3

# Disable proactive compaction — it steals CPU at random moments (microstutter)
vm.compaction_proactiveness = 0

# Don't aggressively reclaim on watermark boost (another stutter source).
vm.watermark_boost_factor = 0

# Some anticheat/Unreal titles (The Finals = UE5) hammer split locks; the
# default kernel "mitigation" intentionally THROTTLES the offending process
# to ~100Hz. Turning it off restores full speed.
kernel.split_lock_mitigate = 0

# Huge mmap counts for modern games + esync (CachyOS sets this too; explicit
# here so it survives on non-CachyOS bases).
vm.max_map_count = 2147483642

# ── Network: online-shooter friendly ────────────────────────────────────────
# BBR keeps throughput stable under loss/jitter where CUBIC sawtooths
# (CachyOS kernels default to BBR already; explicit for other bases).
net.ipv4.tcp_congestion_control = bbr
# Don't queue more than 64KB of unsent data in the kernel — lower
# bufferbloat-style latency for the game's own TCP traffic.
net.ipv4.tcp_notsent_lowat = 65536
