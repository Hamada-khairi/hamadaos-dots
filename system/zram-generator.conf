# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — ZRAM Compressed Swap
# ═══════════════════════════════════════════════════════════════════════════════
# Installed to: /etc/systemd/zram-generator.conf
# Compresses RAM pages instead of swapping to disk → less gaming stutter.
# ═══════════════════════════════════════════════════════════════════════════════
[zram0]
zram-size            = ram / 2
compression-algorithm = zstd
swap-priority        = 100
