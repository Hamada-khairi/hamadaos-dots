# ═══════════════════════════════════════════════════════════════════════════════
# HamadaOS — esync/fsync File Descriptor Limits
# ═══════════════════════════════════════════════════════════════════════════════
# Installed to: /etc/systemd/system.conf.d/99-nofile.conf
# Required by:  Proton/Wine games (esync/fsync needs 1000s of file descriptors)
#
# Without this, many Windows games crash with "too many open files" errors.
# ═══════════════════════════════════════════════════════════════════════════════
[Manager]
DefaultLimitNOFILE=524288
